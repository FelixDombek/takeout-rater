name: Publish CI Image

on:
  push:
    branches: ["main"]
    paths:
      - 'pyproject.toml'
      - 'Dockerfile.ci'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Image Name
        # This converts the repo path to lowercase safely
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}:latest" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ env.IMAGE_NAME }}