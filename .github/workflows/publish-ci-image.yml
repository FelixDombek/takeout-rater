name: Publish CI Image

on:
  push:
    branches: ["main"]
    paths:
      - 'pyproject.toml'
      - 'Dockerfile.ci'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # We define an output so the build step can definitely see the lowercase name
    outputs:
      image_name: ${{ steps.prep.outputs.repo }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Image Name
        id: prep
        run: |
          # This creates a lowercase version of the repo path and sets it as an output
          REPO_LOWER=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO_LOWER}:latest" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          # Using the output from the 'prep' step ensures the tag is present
          tags: ${{ steps.prep.outputs.repo }}