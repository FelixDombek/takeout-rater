name: Publish CI Image

on:
  push:
    branches: ["main"]
    paths:
      - 'pyproject.toml'
      - 'Dockerfile.ci'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # We use Docker's own caching here so that if only 
      # one line in pyproject.toml changed, the build is fast.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/takeout-rater-ci:latest