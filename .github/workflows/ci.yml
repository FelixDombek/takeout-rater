name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_WRITE_PAT }}

      - name: Run Ruff (Fix and Format)
        uses: astral-sh/ruff-action@v1
        with:
          args: "check --fix ."

      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v1
        with:
          args: "format ."

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff auto-fix and format"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false

  test:
    runs-on: ubuntu-latest
    container:
      # Hardcoded lowercase name to satisfy Docker's requirements
      image: ghcr.io/felixdombek/takeout-rater:latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync dependencies
        run: pip install --no-deps -e .

      - name: Run tests
        run: pytest

  slow-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/felixdombek/takeout-rater:latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync dependencies
        run: pip install --no-deps -e .

      - name: Run slow tests
        env:
          HF_HUB_OFFLINE: "1"
        run: pytest tests/slow/