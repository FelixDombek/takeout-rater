name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for pushing the fixes back to the PR
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Check out the head branch of the PR so we can push back to it
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_WRITE_PAT }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff (Fix and Format)
        run: |
          # 1. Fix linting errors (unused imports, etc.)
          ruff check --fix .
          # 2. Reformat the code (indentation, quotes, etc.)
          ruff format .

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff auto-fix and format"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          # This ensures the step succeeds even if no changes were needed
          skip_dirty_check: false

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  slow-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run slow tests
        env:
          HF_HUB_OFFLINE: "1"
        run: pytest tests/slow/
