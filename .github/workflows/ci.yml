name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  format-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_WRITE_PAT }}
      - name: Run Ruff Check
        uses: astral-sh/ruff-action@v1
        with:
          args: "check --fix ."
      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v1
        with:
          args: "format ."
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff auto-fix and format"

  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/felixdombek/takeout-rater:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install current package
        # --no-deps is critical: it prevents pip from trying to 
        # re-verify/download the massive torch/onnx packages.
        run: pip install --no-deps -e .
      - name: Run tests
        run: pytest

  slow-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/felixdombek/takeout-rater:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install current package
        run: pip install --no-deps -e .
      - name: Run slow tests
        env:
          HF_HUB_OFFLINE: "1"
        run: pytest tests/slow/