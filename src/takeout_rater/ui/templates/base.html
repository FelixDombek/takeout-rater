<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}takeout-rater{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f5;
    }
    header {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header a { color: #aac4ff; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
    header a:hover { color: #fff; }
    main { padding: 1.5rem; max-width: 1600px; margin: 0 auto; }
    .muted { color: #666; font-size: 0.875rem; }
    a { color: #1a5cdb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 0.875rem;
      color: #333;
      text-decoration: none;
    }
    .btn:hover { background: #f0f0f0; }
    .btn-primary { background: #1a5cdb; color: #fff; border-color: #1a5cdb; }
    .btn-primary:hover { background: #1449b0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <a href="/assets">📷 takeout-rater</a>
    <a href="/clusters" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">🔗 Clusters</a>
    <span class="muted">local photo library</span>
    <a href="/setup" style="margin-left:auto; font-size:0.85rem; color:#aac4ff; text-decoration:none;" title="Change Takeout folder">⚙ Setup</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
