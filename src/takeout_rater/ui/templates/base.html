<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}takeout-rater{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='1em' font-size='1em'>📷</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f5;
    }
    header {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header a { color: #aac4ff; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
    header a:hover { color: #fff; }
    main { padding: 1.5rem; max-width: 1600px; margin: 0 auto; }
    .muted { color: #666; font-size: 0.875rem; }
    a { color: #1a5cdb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 0.875rem;
      color: #333;
      text-decoration: none;
    }
    .btn:hover { background: #f0f0f0; }
    .btn-primary { background: #1a5cdb; color: #fff; border-color: #1a5cdb; }
    .btn-primary:hover { background: #1449b0; }

    /* ── Global error toast ──────────────────────────────────────────────── */
    #error-toast {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: #b91c1c;
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 6px;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(0,0,0,.25);
      max-width: 90vw;
      word-break: break-word;
      cursor: pointer;
    }
    #error-toast.visible { display: block; }
  </style>
  <script>
    /**
     * showError(msg) – display a dismissible error toast at the bottom of the
     * screen.  Call from any inline script to surface API / fetch errors.
     */
    function showError(msg) {
      const t = document.getElementById("error-toast");
      if (!t) return;
      t.textContent = "⚠ " + msg;
      t.classList.add("visible");
      // Auto-dismiss after 8 seconds
      clearTimeout(t._hideTimer);
      t._hideTimer = setTimeout(function() { t.classList.remove("visible"); }, 8000);
    }
  </script>
  {% block head %}{% endblock %}
  <link rel="stylesheet" href="/static/sidebar.css">
  <link rel="stylesheet" href="/static/jobs-shared.css">
  <script src="/static/jobs-shared.js"></script>
</head>
<body>
  <div id="error-toast" role="alert" onclick="this.classList.remove('visible')"></div>
  <header>
    <a href="/assets">📷 takeout-rater</a>
    <a href="/search" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">🔍 Search</a>
    <a href="/albums" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">🖼️ Albums</a>
    <a href="/clusterings" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">🔗 Clustering</a>
    <a href="/faces" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">👤 Faces</a>
    <a href="/clip" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">✂ CLIP</a>
    <a href="/scoring" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">🎯 Scoring</a>
    <a href="/jobs" style="font-size:0.95rem; color:#aac4ff; font-weight:normal;">⚙ Jobs</a>
    <span id="lib-status" class="muted" style="font-size:0.8rem;">local photo library</span>
    <a href="/setup" style="margin-left:auto; font-size:0.85rem; color:#aac4ff; text-decoration:none;" title="Change Takeout folder">📁 Setup</a>
  </header>
  <script>
    (function () {
      fetch('/api/library/status')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var el = document.getElementById('lib-status');
          if (!el) return;
          if (!d.photos_root) {
            el.textContent = 'local photo library · not configured';
            return;
          }
          el.textContent =
            'library: ' + d.photos_root +
            ' · schema v' + d.db_schema_version +
            ' · scan v' + d.db_scan_version;
        })
        .catch(function () { /* leave default text on error */ });
    })();
  </script>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
